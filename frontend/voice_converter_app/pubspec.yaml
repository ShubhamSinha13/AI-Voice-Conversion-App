name: voice_converter_app
description: "AI Voice Conversion App - Convert voices in real-time for calls and videos"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI & State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  get: ^4.6.0
  
  # HTTP & Networking
  dio: ^5.3.0
  http: ^1.1.0
  
  # Audio & Media
  record: ^6.0.0
  audio_session: ^0.1.16
  flutter_sound: ^9.7.0
  just_audio: ^0.9.36
  file_picker: ^9.0.0
  
  # Database & Storage
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  
  # Authentication
  flutter_secure_storage: ^8.1.0
  jwt_decoder: ^2.0.1
  
  # Utils
  intl: ^0.19.0
  timeago: ^3.6.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  
  # Permissions
  permission_handler: ^11.4.0
  
  # Native Android/iOS Integration
  platform: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^2.0.0
  
  # Code Generation
  build_runner: ^2.4.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/sounds/
